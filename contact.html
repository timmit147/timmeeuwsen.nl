<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Tim Meeuwsen</title>
  <meta name="description" content="Neem contact op met Tim Meeuwsen voor vragen, projecten of samenwerkingen." />
  <link rel="canonical" href="https://timmeeuwsen.nl/contact" />

  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#2563eb" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="https://timmeeuwsen.nl/" class="logo">Tim Meeuwsen</a>
    <a href="/menu" class="menu">menu</a>
  </div>
</nav>

<style>
.nav {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #eee;
}
.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
}
.logo, .menu {
  text-decoration: none;
  color: #0f172a;
  font-weight: 600;
}
</style>

<main>

<!-- HERO -->
<header class="hero">
  <div class="container">

    <span class="badge">Contact</span>

    <h1>Stuur een bericht</h1>

    <p>
      Heb je een vraag, idee of project? Stuur het door en ik reageer zo snel mogelijk.
    </p>

    <a href="#form" class="btn">Naar formulier</a>

  </div>
</header>

<style>
.hero {
  padding: 60px 20px 20px;
  font-family: Arial;
}
.container {
  max-width: 1000px;
  margin: auto;
}
.badge {
  display: inline-block;
  padding: 6px 12px;
  background: #eef2ff;
  color: #1e40af;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}
h1 {
  font-size: 42px;
  margin: 16px 0;
}
p {
  color: #475569;
  max-width: 600px;
}
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 18px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 12px;
}
</style>

<!-- FORM -->
<section id="form" class="contact">
  <div class="container">

    <h2>Contact formulier</h2>

    <form id="contactForm">

      <input type="text" name="name" placeholder="Naam" required />
      <input type="email" name="email" placeholder="E-mail" required />
      <input type="text" name="subject" placeholder="Onderwerp" required />
      <textarea name="message" placeholder="Bericht" required></textarea>

      <button type="submit" id="submitBtn">Versturen</button>

      <p id="status"></p>

    </form>

  </div>
</section>

<style>
.contact {
  padding: 60px 20px;
  background: #f8fafc;
  font-family: Arial;
}
.container {
  max-width: 700px;
  margin: auto;
}
form {
  display: grid;
  gap: 12px;
}
input, textarea {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
}
textarea {
  min-height: 140px;
}
button {
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
#status {
  font-size: 14px;
  color: #475569;
}
</style>

<script>
const form = document.getElementById("contactForm");
const statusEl = document.getElementById("status");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  btn.disabled = true;
  statusEl.textContent = "Versturen...";

  const payload = {
    name: form.name.value.trim(),
    email: form.email.value.trim(),
    subject: form.subject.value.trim(),
    message: form.message.value.trim()
  };

  try {
    const res = await fetch("https://cloud-run-148568431200.europe-west4.run.app/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.ok) {
      statusEl.textContent = "Bericht succesvol verstuurd!";
      form.reset();
    } else {
      statusEl.textContent = "Er ging iets mis.";
    }

  } catch (err) {
    statusEl.textContent = "Server fout.";
  }

  btn.disabled = false;
});
</script>

</main>

</body>
</html>
