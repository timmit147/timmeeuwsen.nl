<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Overzicht – Tim Meeuwsen | Webdesign Utrecht</title>
  <meta name="description" content="Overzicht van alle belangrijke pagina's van Tim Meeuwsen – Webdesign Utrecht. Snelle toegang tot Home, Website laten maken Utrecht, Demo en Contact.">
  <link rel="canonical" href="https://timmeeuwsen.nl/menu.html">
  <meta name="robots" content="index, follow">

  <style>
    :root {
      --bg: #f5f4f0;
      --text: #0d0d0d;
      --border: #d8d4cc;
      --white: #ffffff;
      --blue: #007bff;
      --blue-hover: #0069d9;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .menu-4 {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }

    .menu-4 .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: nowrap;
    }

    .menu-naam a {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      white-space: nowrap;
    }

    .menu-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: nowrap;
    }

    .menu-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.1rem;
      border-radius: 999px;
      background: var(--blue);
      color: var(--white);
      font-weight: 700;
      line-height: 1;
      transition: background-color 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
    }

    .menu-cta:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 7rem 2rem 4rem;
    }

    .menu-container {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.1;
      margin-bottom: 2rem;
      text-align: left;
    }

    ul.links {
      list-style: none;
      padding: 0;
      text-align: left;
    }

    ul.links li {
      margin-bottom: 1rem;
    }

    ul.links a {
      font-size: 1.2rem;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    ul.links a:hover {
      border-color: #1a6b3c;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.9rem;
      color: #666;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    @media (max-width: 600px) {
      .menu-4 .container {
        padding: 0.9rem 1rem;
      }

      main {
        padding: 6.5rem 1rem 3rem;
      }

      .menu-naam a {
        font-size: 1rem;
      }

      ul.links a {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>

  <nav class="menu-4">
    <div class="container">
      <span class="menu-naam">
        <a href="https://timmeeuwsen.nl/">Tim Meeuwsen</a>
      </span>

      <div class="menu-links">
        <a href="javascript:history.back()" class="menu-cta">Terug</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="menu-container">
      <h1>Menu Overzicht</h1>
      <ul class="links">
        <li><a href="https://timmeeuwsen.nl/">Home</a></li>
        <li><a href="https://timmeeuwsen.nl/website-laten-maken-utrecht/">Website laten maken Utrecht</a></li>
        <li><a href="https://timmeeuwsen.nl/demo/">Demo</a></li>
        <li><a href="https://timmeeuwsen.nl/#contact">Contact</a></li>
      </ul>
    </div>
  </main>

  <footer>
    &copy; 2026 Tim Meeuwsen – Webdesign Utrecht
  </footer>

</body>
</html>
