<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Overzicht – Tim Meeuwsen | Webdesign Utrecht</title>
  <meta name="description" content="Overzicht van alle belangrijke pagina's van Tim Meeuwsen – Webdesign Utrecht. Snelle toegang tot Home, Website laten maken Utrecht, Demo en Contact.">
  <link rel="canonical" href="https://timmeeuwsen.nl/menu.html">
  <meta name="robots" content="index, follow">

  <style>

    * {
    box-sizing: border-box;
}

body {
    margin: 0px;
    font-family: sans-serif;
    overflow-x: hidden;
    width: 100%;
}

.container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px 40px;
}

    html, body {
      height: 100%;
      margin: 0;
      background: #f5f4f0;
      color: #0d0d0d;
      display: flex;
      flex-direction: column;
    }


.menu-4 {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: white;
    z-index: 999;
    border-bottom: 1px solid #ddd;
}

.menu-4 .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    gap: 20px;
    flex-wrap: nowrap; /* houdt alles op 1 lijn */
}

.menu-4 .menu-naam a {
    font-weight: 900;
    font-size: 1.2rem;
    color: black;
    text-decoration: none;
    white-space: nowrap; /* voorkomt dat logo op meerdere regels komt */
}

.menu-4 .menu-links {
    display: flex;
    gap: 10px;
    align-items: center;
}

.menu-4 .menu-links a {
    color: black;
    text-decoration: none;
    padding: 8px 16px;
    font-weight: 500;
    transition: background 0.3s, color 0.3s;
}

/* CTA styling voor Contact knop */
.menu-4 .menu-links .menu-cta {
    background-color: #332C2F;
    color: white;
    border-radius: 5px;
    font-weight: 700;
}

/* Hover effect */
.menu-4 .menu-links a:hover {
    opacity: 0.8;
}

/* Mobiel (max 600px) */
@media (max-width: 600px) {

    .menu-4 .menu-naam a {
        font-size: 1rem;
    }

    .menu-4 .menu-links a {
        font-size: 0.95rem;
    }
}

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 6rem 2rem 4rem; /* extra top padding zodat nav niet overlapt */
    }

    .menu-container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 2rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    ul.links {
      list-style: none;
      padding: 0;
      text-align: left;
    }

    ul.links li {
      margin-bottom: 1rem;
    }

    ul.links a {
      font-size: 1.2rem;
      color: #0d0d0d;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }

    ul.links a:hover {
      border-color: #1a6b3c;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.9rem;
      color: #666;
      border-top: 1px solid #d8d4cc;
      background: #f5f4f0;
    }
  </style>
</head>
<body>

  <!-- Nav met Terug knop -->
  <nav class="menu-4">
    <div class="container">
      <span class="menu-naam">
        <a href="https://timmeeuwsen.nl/" style="text-decoration:none; color:inherit;">Tim Meeuwsen</a>
      </span>
      <div class="menu-links">
        <a href="javascript:history.back()">Terug</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="menu-container">
      <h1>Menu Overzicht</h1>
      <ul class="links">
        <li><a href="https://timmeeuwsen.nl/">Home</a></li>
        <li><a href="https://timmeeuwsen.nl/website-laten-maken-utrecht">Website laten maken Utrecht</a></li>
        <li><a href="https://timmeeuwsen.nl/demo">Demo</a></li>
        <li><a href="https://timmeeuwsen.nl/#contact">Contact</a></li>
      </ul>
    </div>
  </main>

  <footer>
    &copy; 2026 Tim Meeuwsen – Webdesign Utrecht
  </footer>

</body>
</html>
