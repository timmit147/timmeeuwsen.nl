<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Overzicht – Tim Meeuwsen | Webdesign Utrecht</title>
  <meta name="description" content="Overzicht van alle belangrijke pagina's van Tim Meeuwsen – Webdesign Utrecht. Snelle toegang tot Homepagina, Diensten en Contact." />
  <link rel="canonical" href="https://timmeeuwsen.nl/menu.html" />
  <meta name="robots" content="index, follow" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="font-sans overflow-x-hidden w-full">

<!-- START NAV BLOCK -->
<nav class="nav-block" aria-label="Hoofdnavigatie">
  <div class="nav-container">
    <a href="https://timmeeuwsen.nl/" class="nav-logo">Tim Meeuwsen</a>
    <a href="javascript:history.back()" class="nav-menu-text">menu</a>
  </div>
</nav>

<style>
  .nav-block {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    z-index: 1000;
  }

  .nav-container {
    max-width: 1080px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 24px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: inherit;
  }

  .nav-logo,
  .nav-menu-text {
    text-decoration: none;
    color: #0f172a;
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
  }

  .nav-menu-text {
    position: relative;
    display: inline-block;
    padding-bottom: 4px;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }

  .nav-menu-text::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: currentColor;
  }
</style>
<!-- END NAV BLOCK -->


<!-- START MAIN -->
<main class="main">
  <div class="main-container">
    <h1 class="main-title">Menu Overzicht</h1>

    <ul class="menu-list">
      <li>
        <a href="https://timmeeuwsen.nl/">Homepagina</a>
      </li>

      <li class="menu-dropdown">
        <details>
          <summary>
            <span>Diensten</span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </summary>

          <div class="dropdown-panel">
            <a href="https://timmeeuwsen.nl/duidelijke-website-laten-maken">Duidelijke websites</a>
            <a href="https://timmeeuwsen.nl/handmatig-werk-automatiseren">Handmatig werk automatiseren</a>
            <a href="https://timmeeuwsen.nl/excel-automatisering">Excel automatisering</a>
            <a href="https://timmeeuwsen.nl/excel-naar-dashboard">Excel naar dashboard</a>
          </div>
        </details>
      </li>

      <li>
        <a href="https://timmeeuwsen.nl/contact">Contact</a>
      </li>
    </ul>
  </div>
</main>

<style>
  .main {
    margin-top: 80px;
    padding: 0 20px;
  }

  .main-container {
    max-width: 600px;
    margin: 0 auto;
  }

  .main-title {
    margin-bottom: 24px;
    font-size: 40px;
    font-weight: 800;
    line-height: 1.2;
    color: #0f172a;
  }

  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .menu-list li {
    margin-bottom: 14px;
  }

  .menu-list > li > a,
  .menu-dropdown summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
    padding: 16px 18px;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.9);
    color: #0f172a;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    box-shadow: 0 8px 30px rgba(15, 23, 42, 0.04);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    box-sizing: border-box;
  }

  .menu-list > li > a:hover,
  .menu-dropdown summary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
    border-color: rgba(15, 23, 42, 0.14);
  }

  .menu-dropdown details {
    width: 100%;
  }

  .menu-dropdown summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
  }

  .menu-dropdown summary::-webkit-details-marker {
    display: none;
  }

  .chevron {
    font-size: 18px;
    line-height: 1;
    transition: transform 0.25s ease;
    opacity: 0.7;
  }

  .menu-dropdown details[open] .chevron {
    transform: rotate(180deg);
  }

  .dropdown-panel {
    margin-top: 10px;
    padding: 10px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(255, 255, 255, 0.98));
    border: 1px solid rgba(15, 23, 42, 0.08);
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
  }

  .dropdown-panel a {
    display: block;
    padding: 13px 14px;
    margin: 4px 0;
    border-radius: 12px;
    text-decoration: none;
    color: #334155;
    font-size: 16px;
    font-weight: 500;
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }

  .dropdown-panel a:hover {
    background: rgba(15, 23, 42, 0.04);
    color: #0f172a;
    transform: translateX(2px);
  }

  @media (max-width: 640px) {
    .main {
      margin-top: 64px;
      padding: 0 16px;
    }

    .main-title {
      font-size: 32px;
    }

    .menu-list > li > a,
    .menu-dropdown summary {
      font-size: 17px;
      padding: 15px 16px;
    }
  }
</style>
<!-- END MAIN -->

</body>
</html>
