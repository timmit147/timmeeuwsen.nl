<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Overzicht – Tim Meeuwsen | Webdesign Utrecht</title>
  <meta name="description" content="Overzicht van alle belangrijke pagina's van Tim Meeuwsen – Webdesign Utrecht. Snelle toegang tot Homepagina en Demo." />
  <link rel="canonical" href="https://timmeeuwsen.nl/menu.html" />
  <meta name="robots" content="index, follow" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="font-sans overflow-x-hidden w-full">

<!-- START NAV BLOCK -->
<nav class="nav-block" aria-label="Hoofdnavigatie">
  <div class="nav-container">
    <a href="https://timmeeuwsen.nl/" class="nav-logo">Tim Meeuwsen</a>
    <a href="javascript:history.back()" class="nav-menu-text">menu</a>
  </div>
</nav>

<style>
  .nav-block {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    z-index: 1000;
  }

  .nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 600px; /* zelfde als main */
    margin: 0 auto;
    padding: 14px 20px; /* zelfde padding als main */
  }

  .nav-logo {
    font-weight: 500;
    font-size: 16px;
    color: #0f172a;
    text-decoration: none;
  }

  .nav-menu-text {
    font-weight: 500;
    font-size: 16px;
    color: #0f172a;
    text-decoration: none;
    text-transform: lowercase;
    letter-spacing: 0.04em;
    position: relative;
    padding-bottom: 4px;
  }

  .nav-menu-text::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: currentColor;
  }
</style>
<!-- END NAV BLOCK -->


<!-- START MAIN -->
<main class="main">
  <div class="main-container">
    <h1 class="main-title">Menu Overzicht</h1>

    <ul class="menu-list">
      <li>
        <a href="https://timmeeuwsen.nl/">Homepagina</a>
      </li>
      <li>
        <a href="https://timmeeuwsen.nl/demo">Demo website</a>
      </li>
    </ul>
  </div>
</main>

<style>
  .main {
    margin-top: 80px;
    padding: 0 20px;
  }

  .main-container {
    max-width: 600px;
    margin: 0 auto;
  }

  .main-title {
    margin-bottom: 20px;
    font-size: 40px;
    font-weight: 800;
    line-height: 1.2;
  }

  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .menu-list li {
    margin-bottom: 15px;
  }

  .menu-list a {
    text-decoration: none;
    color: #0f172a;
    font-size: 20px;
    transition: opacity 0.25s ease;
  }

  .menu-list a:hover {
    opacity: 0.7;
  }
</style>
<!-- END MAIN -->

</body>
</html>
