<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Overzicht – Tim Meeuwsen | Webdesign Utrecht</title>
  <meta name="description" content="Overzicht van alle belangrijke pagina's van Tim Meeuwsen – Webdesign Utrecht." />
  <link rel="canonical" href="https://timmeeuwsen.nl/menu.html" />
  <meta name="robots" content="index, follow" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- START NAV BLOCK -->
<nav class="nav-block" aria-label="Hoofdnavigatie">
  <div class="nav-container">
    <a href="https://timmeeuwsen.nl/" class="nav-logo">Tim Meeuwsen</a>
    <a href="javascript:history.back()" class="nav-menu-text">menu</a>
  </div>
</nav>

<style>
  .nav-block {
    position: sticky;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    z-index: 1000;
  }

  .nav-container {
    max-width: 1080px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 24px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: inherit;
  }

  .nav-logo,
  .nav-menu-text {
    text-decoration: none;
    color: #0f172a;
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
  }

  .nav-menu-text {
    position: relative;
    display: inline-block;
    padding-bottom: 4px;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }

  .nav-menu-text::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: currentColor;
  }
</style>
<!-- END NAV BLOCK -->



<!-- MAIN BLOCK -->
<main class="main">
  <div class="main-container">

    <h1>Menu Overzicht</h1>

    <ul class="menu-list">

      <li>
        <a class="menu-link" href="https://timmeeuwsen.nl/">
          Homepagina
        </a>
      </li>

      <li>
        <details class="dropdown">
          <summary class="menu-link">
            Diensten
            <span class="toggle">+</span>
          </summary>

          <div class="dropdown-panel">
            <a href="https://timmeeuwsen.nl/duidelijke-website-laten-maken">Duidelijke websites</a>
            <a href="https://timmeeuwsen.nl/handmatig-werk-automatiseren">Automatiseren</a>
            <a href="https://timmeeuwsen.nl/excel-automatisering">Excel automatisering</a>
            <a href="https://timmeeuwsen.nl/excel-naar-dashboard">Dashboard</a>
          </div>
        </details>
      </li>

      <li>
        <a class="menu-link" href="https://timmeeuwsen.nl/contact">
          Contact
        </a>
      </li>

    </ul>
  </div>
</main>

<style>
  .main {
    margin-top: 80px;
    padding: 0 20px 60px;
  }

  .main-container {
    max-width: 620px;
    margin: 0 auto;
    font-family: system-ui, sans-serif;
  }

  h1 {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 24px;
    color: #0f172a;
  }

 .menu-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

  .menu-link {
    display: flex;
    justify-content: space-between;
    padding: 16px 18px;
    border: 1px solid rgba(15,23,42,0.08);
    border-radius: 16px;
    text-decoration: none;
    color: #0f172a;
    font-weight: 600;
    background: #fff;
  }

  .menu-link:hover {
    background: #f8fafc;
  }

  /* SINGLE + FIX */
  .toggle {
    color: #94a3b8;
    font-weight: 400;
    transition: transform 0.2s ease;
  }

  details[open] .toggle {
    transform: rotate(45deg);
  }

  .dropdown-panel {
    margin-top: 8px;
    padding: 8px;
    border: 1px solid rgba(15,23,42,0.08);
    border-radius: 14px;
    background: #fff;
  }

  .dropdown-panel a {
    display: block;
    padding: 10px;
    text-decoration: none;
    color: #334155;
    border-radius: 10px;
  }

  .dropdown-panel a:hover {
    background: #f8fafc;
    color: #0f172a;
  }
</style>

</body>
</html>
